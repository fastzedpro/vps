worker_processes auto;

events {}

http {
    # --------------------
    # Common proxy headers (Cloud Run safe)
    # --------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --------------------
    # BACKEND POOL + HEALTH CHECK
    # --------------------
    upstream cloudrun_backends {
        # If a backend fails 3 times in 10s → temporarily removed
        server 194.238.24.162:700 max_fails=3 fail_timeout=10s;
        server 194.238.24.207:700 max_fails=3 fail_timeout=10s;
        server 194.238.24.168:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.36:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.35:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.32:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.31:700 max_fails=3 fail_timeout=10s;
        server 217.77.14.189:700 max_fails=3 fail_timeout=10s;
        server 217.77.14.188:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.139:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.138:700 max_fails=3 fail_timeout=10s;
        server 195.26.243.136:700 max_fails=3 fail_timeout=10s;
        server 217.77.15.158:700 max_fails=3 fail_timeout=10s;
        server 217.77.15.157:700 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://cloudrun_backends;

            # --------------------
            # TIMEOUTS (IMPORTANT)
            # --------------------
            proxy_connect_timeout 3s;   # backend connect time
            proxy_send_timeout 10s;     # send request to backend
            proxy_read_timeout 10s;     # wait for backend response

            # --------------------
            # Connection handling
            # --------------------
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # --------------------
            # Failover behavior
            # --------------------
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
